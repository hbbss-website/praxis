<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 - 社会实践记录</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <h1>我的社会实践记录</h1>
                <p>查看和管理你已经提交的社会实践记录。</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-label">记录总数</div>
                    <div class="stat-value" id="total-count">0</div>
                </div>
                <div class="stat-card accent">
                    <div class="stat-label">总时长</div>
                    <div class="stat-value" id="total-duration">0 小时</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-label">待审核</div>
                    <div class="stat-value" id="pending-count">0</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">已通过</div>
                    <div class="stat-value" id="approved-count">0</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">记录列表</h3>
                </div>
                <div id="records-container"></div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/student/dashboard.js"></script>
</body>
</html>
