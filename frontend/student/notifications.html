<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 - 通知中心</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>社会实践系统</h2>
                <span class="role-badge student">学生</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    我的记录
                </a>
                <a href="upload.html">
                    <div class="nav-item-container">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        上传记录
                    </div>
                </a>
                <a href="notifications.html" class="active">
                    <div class="nav-item-container">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        通知中心
                        <span class="notification-badge" id="nav-notification-badge">0</span>
                    </div>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">S</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">加载中...</div>
                        <div class="user-role">学生</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" id="logout-button" type="button" style="width: 100%;">
                    退出登录
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>通知中心</h1>
                <p>查看教师对你的实践记录的审核或删除通知。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">我的通知</h3>
                </div>
                <div id="notifications-container"></div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/student/notifications.js"></script>
</body>
</html>
