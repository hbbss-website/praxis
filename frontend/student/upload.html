<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传记录 - 社会实践记录</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <h1>上传社会实践记录</h1>
                <p>填写下方信息，并可选上传一张相关图片。</p>
            </div>

            <div class="card" style="max-width: 800px;">
                <div class="error-message" id="error-message"></div>
                <div class="success-message" id="success-message"
                    style="display: none; background: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;">
                </div>

                <form id="upload-form">
                    <div class="form-group">
                        <label for="title">实践标题 *</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="practice_date">实践日期 *</label>
                            <input type="date" id="practice_date" name="practice_date" required>
                        </div>

                        <div class="form-group">
                            <label for="duration">时长（小时）*</label>
                            <input type="number" id="duration" name="duration" min="0.1" step="0.1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">地点</label>
                        <input type="text" id="location" name="location">
                    </div>

                    <div class="form-group">
                        <label for="content">实践内容 *</label>
                        <textarea id="content" name="content" placeholder="描述你做了什么、有哪些收获、最后结果如何..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>实践照片</label>
                        <div class="image-upload" id="image-upload" role="button" tabindex="0">
                            <input type="file" id="image-input" accept="image/*" style="display: none;">
                            <div id="upload-placeholder">
                                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    style="margin-bottom: 12px; opacity: 0.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <p style="color: var(--gray-600);">点击选择图片</p>
                                <p style="font-size: 12px; color: var(--gray-400); margin-top: 4px;">支持
                                    JPG、PNG、GIF，大小不超过 5 MiB</p>
                            </div>
                            <img id="image-preview" style="display: none;" alt="预览图">
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <a href="dashboard.html" class="btn btn-secondary" style="flex: 1;">取消</a>
                        <button type="submit" class="btn btn-primary" id="submit-btn" style="flex: 1;">
                            提交记录
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../js/student/upload.js"></script>
</body>

</html>
