<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录管理 - 管理中心</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <h1>记录管理</h1>
                <p>审核和管理学生的社会实践记录。</p>
            </div>

            <div class="card">
                <div class="filter-bar">
                    <select id="rec-filter-student">
                        <option value="">全部学生</option>
                    </select>
                    <select id="rec-filter-status">
                        <option value="">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已驳回</option>
                    </select>
                    <input type="date" id="rec-filter-created-after" title="创建时间起">
                    <input type="date" id="rec-filter-created-before" title="创建时间止">
                    <button class="btn btn-primary btn-sm" id="rec-refresh" type="button">刷新</button>
                </div>
                <div class="batch-bar" id="rec-batch-bar" style="display: none;">
                    <span id="rec-batch-count">已选 0 条</span>
                    <button class="btn btn-sm btn-success" id="rec-batch-approve" type="button">批量通过</button>
                    <button class="btn btn-sm btn-danger" id="rec-batch-reject" type="button">批量驳回</button>
                    <button class="btn btn-sm btn-warning" id="rec-batch-undo" type="button">批量撤销</button>
                    <button class="btn btn-sm btn-danger" id="rec-batch-delete" type="button">批量删除</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="rec-select-all"></th>
                                <th>学生</th>
                                <th>标题</th>
                                <th>日期</th>
                                <th>时长</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="rec-table">
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 40px;">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">审核记录</h3>
                <button class="modal-close" id="close-review-modal" type="button">&times;</button>
            </div>
            <div class="modal-body">
                <div id="review-content"></div>
                <div class="form-group" style="margin-top: 20px;">
                    <label for="review-comment">评语（可选）</label>
                    <textarea id="review-comment" placeholder="请输入审核评语..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-review" type="button">取消</button>
                <button class="btn btn-warning" id="undo-review" type="button">撤销审核</button>
                <button class="btn btn-danger" id="reject-review" type="button">驳回</button>
                <button class="btn btn-success" id="approve-review" type="button">通过</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin/records.js"></script>
</body>

</html>
