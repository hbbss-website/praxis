<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分配管理 - 管理中心</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <h1>分配管理</h1>
                <p>管理教师与学生之间的审核分配关系。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">教师-学生分配</h3>
                </div>
                <div style="padding: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px;">
                        <div class="form-group">
                            <label for="assign-teacher">教师</label>
                            <select id="assign-teacher">
                                <option value="">选择教师</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>操作</label>
                            <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
                                <button class="btn btn-primary btn-sm" id="assign-btn" type="button">分配选中学生</button>
                                <button class="btn btn-danger btn-sm" id="unassign-btn" type="button">取消分配</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="assign-select-all"></th>
                                    <th>UID</th>
                                    <th>姓名</th>
                                    <th>当前教师</th>
                                </tr>
                            </thead>
                            <tbody id="assign-table">
                                <tr>
                                    <td colspan="4" style="text-align: center; padding: 40px;">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin/assignments.js"></script>
</body>

</html>
