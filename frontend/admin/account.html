<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心 - 账号管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <h1>账号管理</h1>
                <p>管理你的账号信息和密码。</p>
            </div>

            <div class="card" style="max-width: 600px;">
                <div class="card-header"><h3 class="card-title">账号信息</h3></div>
                <div style="padding: 20px;">
                    <p><strong>UID：</strong><span id="account-uid"></span></p>
                    <p style="margin-top: 8px;"><strong>姓名：</strong><span id="account-name"></span></p>
                </div>
            </div>

            <div class="card" style="max-width: 600px; margin-top: 20px;">
                <div class="card-header"><h3 class="card-title">修改姓名</h3></div>
                <div style="padding: 20px;">
                    <div class="error-message" id="name-error"></div>
                    <div class="success-message" id="name-success" style="display: none; background: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;"></div>
                    <form id="name-form">
                        <div class="form-group"><label for="name-current-password">当前密码</label><input type="password" id="name-current-password" required></div>
                        <div class="form-group"><label for="new-name">新姓名</label><input type="text" id="new-name" required></div>
                        <button type="submit" class="btn btn-primary" id="name-btn">修改姓名</button>
                    </form>
                </div>
            </div>

            <div class="card" style="max-width: 600px; margin-top: 20px;">
                <div class="card-header"><h3 class="card-title">修改密码</h3></div>
                <div style="padding: 20px;">
                    <div class="error-message" id="password-error"></div>
                    <div class="success-message" id="password-success" style="display: none; background: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;"></div>
                    <form id="password-form">
                        <div class="form-group"><label for="current-password">当前密码</label><input type="password" id="current-password" required></div>
                        <div class="form-group"><label for="new-password">新密码（至少8位）</label><input type="password" id="new-password" minlength="8" required></div>
                        <div class="form-group"><label for="confirm-password">确认新密码</label><input type="password" id="confirm-password" minlength="8" required></div>
                        <button type="submit" class="btn btn-primary" id="password-btn">修改密码</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin/account.js"></script>
</body>
</html>
