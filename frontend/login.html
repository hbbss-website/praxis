<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会实践记录系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>社会实践记录系统</h1>
            <p class="subtitle">学生社会实践管理平台</p>
            
            <div class="error-message" id="error-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="login-btn">
                    登录
                </button>
            </form>
            
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--gray-200);">
                <p style="font-size: 13px; color: var(--gray-600); text-align: center;">
                    测试账号：<br>
                    老师：teacher1 / 123456<br>
                    学生：student1 / 123456
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        // 检查是否已登录
        const token = localStorage.getItem('token');
        if (token) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            redirectByRole(user.role);
        }
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-message');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> 登录中...';
            errorMsg.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    redirectByRole(data.user.role);
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请检查服务器是否运行';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
        
        function redirectByRole(role) {
            if (role === 'teacher') {
                window.location.href = 'teacher/dashboard.html';
            } else if (role === 'student') {
                window.location.href = 'student/dashboard.html';
            }
        }
    </script>
</body>
</html>
