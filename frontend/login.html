<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会实践系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>社会实践系统</h1>
            <p class="subtitle">学生社会实践管理平台</p>

            <div class="error-message" id="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    登录
                </button>
            </form>

            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--gray-200);">
                <p style="font-size: 13px; color: var(--gray-600); text-align: center;">
                    演示账号：<br>
                    教师：teacher1 / 123456<br>
                    学生：student1 / 123456
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
