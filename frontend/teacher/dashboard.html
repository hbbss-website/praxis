<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师中心 - 社会实践管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>社会实践系统</h2>
                <span class="role-badge teacher">教师</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    记录管理
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">T</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">加载中...</div>
                        <div class="user-role">教师</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" id="logout-button" type="button" style="width: 100%;">
                    退出登录
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>社会实践记录管理</h1>
                <p>查看学生提交的实践记录，并完成审核处理。</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-label">记录总数</div>
                    <div class="stat-value" id="total-count">0</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-label">待审核</div>
                    <div class="stat-value" id="pending-count">0</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">已通过</div>
                    <div class="stat-value" id="approved-count">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">学生人数</div>
                    <div class="stat-value" id="student-count">0</div>
                </div>
            </div>

            <div class="card">
                <div class="filter-bar">
                    <select id="filter-student">
                        <option value="">全部学生</option>
                    </select>
                    <select id="filter-status">
                        <option value="">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已驳回</option>
                    </select>
                    <button class="btn btn-primary btn-sm" id="refresh-records-button" type="button">刷新</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>学生</th>
                                <th>标题</th>
                                <th>实践日期</th>
                                <th>时长</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="records-table">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px;">
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">各学生总时长</h3>
                </div>
                <div id="student-duration-list" class="duration-list"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="review-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">审核记录</h3>
                <button class="modal-close" id="close-review-modal" type="button">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-content"></div>
                <div class="form-group" style="margin-top: 20px;">
                    <label for="review-comment">评语（可选）</label>
                    <textarea id="review-comment" placeholder="请输入审核评语..."></textarea>
                </div>
            </div>
            <div class="modal-footer">

                <button class="btn btn-danger" id="reject-review-button" type="button">驳回</button>
                <button class="btn btn-success" id="approve-review-button" type="button">通过</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">编辑记录</h3>
                <button class="modal-close" id="close-edit-modal" type="button">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <div class="form-group">
                        <label for="edit-title">标题 *</label>
                        <input type="text" id="edit-title" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="edit-date">实践日期 *</label>
                            <input type="date" id="edit-date" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-duration">时长（小时）*</label>
                            <input type="number" id="edit-duration" min="0.1" step="0.1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="edit-location">地点</label>
                        <input type="text" id="edit-location">
                    </div>
                    <div class="form-group">
                        <label for="edit-content">内容 *</label>
                        <textarea id="edit-content" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-edit-button" type="button">取消</button>
                <button class="btn btn-primary" id="save-edit-button" type="button">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/teacher/dashboard.js"></script>
</body>
</html>
